<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <script src="./scripts/script.js" defer></script>
</head>
<body>
    <div class="container">
        <div id="calculation"></div>
        <div id="numbers">
            <div id="1">1</div>
            <div id="2">2</div>
            <div id="3">3</div>
            <div id="4">4</div>
            <div id="5">5</div>
            <div id="6">6</div>
            <div id="7">7</div>
            <div id="8">8</div>
            <div id="9">9</div>
        </div>
        <div id="operations">
            <div id="plus">+</div>
            <div id="minus">-</div>
            <div id="multiplication">x</div>
            <div id="division">/</div>
        </div>
        <div id="equal">=</div>
    </div>
</body>
</html>
